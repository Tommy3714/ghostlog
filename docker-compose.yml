version: "3.9"

# GhostLog — full production stack
# One command: docker compose up
#
# Services:
#   db      — Postgres 16 (persistent storage)
#   api     — GhostLog FastAPI (port 8000)
#   otel    — Grafana Tempo (OTel trace backend, port 3200)
#
# Required env:
#   ANTHROPIC_API_KEY   — for Claude-powered RCA (optional, falls back gracefully)
#
# Optional env:
#   DB_PASSWORD         — Postgres password (default: ghostlog_dev)
#   GHOSTLOG_WEBHOOK_URL — webhook for alerts

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ghostlog
      POSTGRES_USER:     ghostlog
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ghostlog_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostlog"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    environment:
      GHOSTLOG_DB_URL:      postgresql://ghostlog:${DB_PASSWORD:-ghostlog_dev}@db:5432/ghostlog
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
      GHOSTLOG_WEBHOOK_URL: ${GHOSTLOG_WEBHOOK_URL:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-http://otel:4318}
      OTEL_SERVICE_NAME:    ghostlog
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - gldata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel:
    image: grafana/tempo:latest
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempodata:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API
      - "4318:4318"   # OTLP HTTP receiver

volumes:
  pgdata:
  gldata:
  tempodata:
